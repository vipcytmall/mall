<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>AKG 全球即時訪客統計｜電視牆</title>
  <meta name="description" content="AKG Global 15 語系即時訪客統計電視牆。">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta name="color-scheme" content="dark">
  <style>
    :root{
      --bg:#030712;
      --panel:rgba(15,23,42,.82);
      --panel-strong:rgba(15,23,42,.95);
      --line:rgba(148,163,184,.16);
      --text:#f8fafc;
      --muted:#94a3b8;
      --blue:#60a5fa;
      --cyan:#22d3ee;
      --gold:#fbbf24;
      --green:#34d399;
      --red:#fb7185;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden}
    body{
      color:var(--text);
      background:
        radial-gradient(circle at 15% 0%,rgba(37,99,235,.24),transparent 34%),
        radial-gradient(circle at 90% 20%,rgba(8,145,178,.18),transparent 28%),
        linear-gradient(150deg,#020617 0%,#071225 52%,#020617 100%);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft JhengHei","Noto Sans TC",sans-serif;
    }
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.18;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
      background-size:52px 52px;
      mask-image:linear-gradient(to bottom,black,transparent 80%);
    }
    .wall{
      position:relative;
      z-index:1;
      width:100vw;
      height:100vh;
      min-height:560px;
      display:grid;
      grid-template-rows:auto minmax(0,1fr) auto;
      gap:clamp(10px,1.2vh,18px);
      padding:clamp(14px,1.8vw,34px);
    }
    .header{
      display:grid;
      grid-template-columns:minmax(0,1fr) auto auto;
      gap:clamp(14px,1.6vw,28px);
      align-items:center;
    }
    .brand{min-width:0}
    .eyebrow{
      color:var(--cyan);
      font-weight:900;
      letter-spacing:.2em;
      text-transform:uppercase;
      font-size:clamp(10px,.7vw,14px);
    }
    h1{
      margin:.25em 0 0;
      font-size:clamp(28px,2.8vw,58px);
      line-height:1;
      letter-spacing:-.035em;
      white-space:nowrap;
    }
    .total-box{
      min-width:clamp(210px,18vw,360px);
      border:1px solid rgba(96,165,250,.28);
      background:linear-gradient(145deg,rgba(30,64,175,.38),rgba(15,23,42,.76));
      box-shadow:0 20px 60px rgba(2,6,23,.34),inset 0 1px 0 rgba(255,255,255,.05);
      border-radius:clamp(16px,1.2vw,26px);
      padding:clamp(12px,1.2vw,22px) clamp(16px,1.4vw,28px);
      text-align:right;
    }
    .total-box span{
      display:block;
      color:#cbd5e1;
      font-size:clamp(11px,.8vw,16px);
      font-weight:700;
      letter-spacing:.08em;
    }
    .total-box strong{
      display:block;
      margin-top:.05em;
      color:var(--gold);
      font-size:clamp(34px,3.7vw,76px);
      line-height:1;
      font-variant-numeric:tabular-nums;
      text-shadow:0 0 24px rgba(251,191,36,.16);
    }
    .right-info{
      min-width:clamp(190px,16vw,310px);
      text-align:right;
    }
    .clock{
      font-size:clamp(24px,2.25vw,46px);
      font-weight:800;
      font-variant-numeric:tabular-nums;
      letter-spacing:.02em;
    }
    .date{
      color:var(--muted);
      margin-top:5px;
      font-size:clamp(11px,.85vw,17px);
    }
    .controls{
      display:flex;
      justify-content:flex-end;
      align-items:center;
      gap:8px;
      margin-top:8px;
    }
    .status-dot{
      width:9px;height:9px;border-radius:50%;
      background:var(--gold);
      box-shadow:0 0 14px currentColor;
    }
    .status-dot.live{background:var(--green)}
    .status-dot.error{background:var(--red)}
    .status-text{
      color:var(--muted);
      font-size:clamp(10px,.72vw,14px);
      white-space:nowrap;
    }
    .icon-btn{
      border:1px solid var(--line);
      background:rgba(15,23,42,.76);
      color:#e2e8f0;
      width:clamp(30px,2.1vw,42px);
      height:clamp(30px,2.1vw,42px);
      border-radius:50%;
      cursor:pointer;
      display:grid;
      place-items:center;
      font-size:clamp(14px,1vw,19px);
    }
    .icon-btn:hover{border-color:var(--blue);background:rgba(30,64,175,.32)}
    .grid{
      min-height:0;
      display:grid;
      grid-template-columns:repeat(5,minmax(0,1fr));
      grid-template-rows:repeat(3,minmax(0,1fr));
      gap:clamp(9px,.85vw,17px);
    }
    .card{
      position:relative;
      min-width:0;
      min-height:0;
      overflow:hidden;
      display:grid;
      grid-template-rows:auto minmax(0,1fr) auto;
      border:1px solid var(--line);
      border-radius:clamp(14px,1vw,22px);
      padding:clamp(11px,1vw,20px);
      background:linear-gradient(145deg,rgba(15,23,42,.9),rgba(11,20,37,.7));
      box-shadow:0 14px 38px rgba(2,6,23,.24),inset 0 1px 0 rgba(255,255,255,.035);
    }
    .card::after{
      content:"";
      position:absolute;
      inset:auto -20% -55% 35%;
      height:100%;
      background:radial-gradient(circle,rgba(37,99,235,.13),transparent 66%);
      pointer-events:none;
    }
    .card.top-1{border-color:rgba(251,191,36,.5);background:linear-gradient(145deg,rgba(120,53,15,.34),rgba(15,23,42,.92))}
    .card.top-2{border-color:rgba(148,163,184,.45)}
    .card.top-3{border-color:rgba(217,119,6,.42)}
    .card.value-changed{animation:valuePulse .9s ease}
    @keyframes valuePulse{0%{box-shadow:0 0 0 rgba(34,211,238,0)}35%{box-shadow:0 0 34px rgba(34,211,238,.42);border-color:rgba(34,211,238,.75)}100%{box-shadow:0 14px 38px rgba(2,6,23,.24)}}
    .card-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
    }
    .language{
      display:flex;
      align-items:center;
      min-width:0;
      gap:clamp(8px,.65vw,13px);
    }
    .flag{
      width:clamp(28px,2vw,42px);
      aspect-ratio:4/3;
      object-fit:cover;
      border-radius:4px;
      box-shadow:0 4px 12px rgba(0,0,0,.36);
      flex:0 0 auto;
    }
    .language-copy{min-width:0}
    .native{
      display:block;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      font-size:clamp(13px,1.05vw,22px);
      font-weight:800;
    }
    .zh-name{
      display:block;
      margin-top:2px;
      color:var(--muted);
      font-size:clamp(9px,.66vw,13px);
    }
    .rank{
      color:#64748b;
      font-weight:900;
      font-size:clamp(11px,.75vw,15px);
      font-variant-numeric:tabular-nums;
    }
    .count{
      align-self:center;
      position:relative;
      z-index:1;
      text-align:center;
      color:#f8fafc;
      font-size:clamp(30px,3.2vw,66px);
      line-height:1;
      font-weight:900;
      letter-spacing:-.045em;
      font-variant-numeric:tabular-nums;
      text-shadow:0 10px 30px rgba(0,0,0,.22);
    }
    .card.top-1 .count{color:var(--gold)}
    .bottom{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:minmax(0,1fr) auto;
      gap:8px;
      align-items:center;
    }
    .bar{
      height:clamp(5px,.42vw,9px);
      overflow:hidden;
      border-radius:99px;
      background:#1e293b;
    }
    .bar span{
      display:block;
      width:0;
      height:100%;
      border-radius:inherit;
      background:linear-gradient(90deg,#2563eb,#22d3ee,#fbbf24);
      transition:width .65s ease;
    }
    .share{
      color:#cbd5e1;
      font-size:clamp(9px,.68vw,14px);
      font-variant-numeric:tabular-nums;
    }
    .footer{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:20px;
      align-items:center;
      color:#64748b;
      font-size:clamp(9px,.7vw,14px);
    }
    .footer .center{text-align:center;color:#94a3b8}
    .footer .right{text-align:right}
    .loading .count{color:#64748b;font-size:clamp(18px,1.5vw,30px);letter-spacing:0}
    .error-banner{
      position:fixed;
      left:50%;
      bottom:28px;
      transform:translateX(-50%);
      z-index:30;
      width:min(720px,calc(100vw - 40px));
      background:rgba(127,29,29,.92);
      border:1px solid rgba(251,113,133,.45);
      color:#fecdd3;
      padding:14px 18px;
      border-radius:14px;
      box-shadow:0 20px 60px rgba(0,0,0,.45);
      text-align:center;
    }
    .error-banner[hidden]{display:none}
    @media(max-aspect-ratio:1.45/1){
      html,body{overflow:auto}
      .wall{height:auto;min-height:100vh}
      .header{grid-template-columns:1fr auto}
      .right-info{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;text-align:left}
      .grid{grid-template-columns:repeat(3,minmax(0,1fr));grid-template-rows:none}
    }
    @media(max-width:720px){
      .header{grid-template-columns:1fr}
      .total-box,.right-info{min-width:0;text-align:left}
      .right-info{display:block}
      .controls{justify-content:flex-start}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .footer{grid-template-columns:1fr;text-align:center}
      .footer .right{text-align:center}
    }
  </style>
</head>
<body>
  <main class="wall">
    <header class="header">
      <div class="brand">
        <div class="eyebrow">AKG Global Analytics</div>
        <h1>全球 15 語系即時訪客</h1>
      </div>

      <section class="total-box" aria-label="累積總訪問數">
        <span>累積總訪問</span>
        <strong id="tv-total">—</strong>
      </section>

      <section class="right-info">
        <div class="clock" id="tv-clock">--:--:--</div>
        <div class="date" id="tv-date">----</div>
        <div class="controls">
          <span class="status-dot" id="tv-status-dot"></span>
          <span class="status-text" id="tv-status">正在連線…</span>
          <button class="icon-btn" id="tv-refresh" type="button" title="立即重新整理" aria-label="立即重新整理">↻</button>
          <button class="icon-btn" id="tv-fullscreen" type="button" title="切換全螢幕" aria-label="切換全螢幕">⛶</button>
        </div>
      </section>
    </header>

    <section class="grid" id="tv-grid" aria-label="各語系訪客統計"></section>

    <footer class="footer">
      <div>Cloudflare D1 即時統計</div>
      <div class="center">每 5 秒自動更新 · <span id="tv-countdown">下次更新 5 秒</span></div>
      <div class="right" id="tv-updated">尚未更新</div>
    </footer>
  </main>

  <div class="error-banner" id="tv-error" hidden></div>

  <script src="./assets/js/counter-config.js?v=20260722-tv1"></script>
  <script src="./assets/js/viewed-tv.js?v=20260722-tv2"></script>
</body>
</html>
